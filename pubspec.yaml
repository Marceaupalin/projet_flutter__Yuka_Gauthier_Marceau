name: formation_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: any

  # UI
  flutter_svg: 2.2.3
  sliver_tools: 0.2.12
  provider: 6.1.5+1
  dio: 5.9.1
  go_router: 17.1.0
  
  # PocketBase client
  pocketbase: ^0.21.0
  # Scanner de code-barres (compatible Android & iOS)
  mobile_scanner: ^5.0.0
  # Partage de liens (rappel produit)
  share_plus: ^10.0.0
  # Requêtes HTTP (Open Food Facts + Rappels Conso)
  http: ^1.2.0
  # Images réseau avec cache (photos produits)
  cached_network_image: ^3.3.0
  # Gestion de l'état
  flutter_riverpod: ^2.5.0
  # Persistance du token de session
  flutter_secure_storage: ^9.0.0
  # Gestion des erreurs réseau / états de chargement
  freezed_annotation: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0

flutter:

  uses-material-design: true

  assets:
    - res/drawables/
    - res/svg/

  fonts:
    - family: AppIcons
      fonts:
        - asset: res/fonts/app_icons.ttf
    - family: Avenir
      fonts:
        - asset: res/fonts/Avenir-Light.ttf
          weight: 300
        - asset: res/fonts/Avenir-Regular.ttf
          weight: 400
        - asset: res/fonts/Avenir-Medium.ttf
          weight: 500
        - asset: res/fonts/Avenir-Black.ttf
          weight: 900

  generate: true